# Signed AAB → Google Play (phone app com.eazpire.wear)
#
# Mirror repo: eazpire-wear-android
# Enable: variable ENABLE_GOOGLE_PLAY=true
# Secrets: same as eazpire-android (PLAY_SERVICE_ACCOUNT_JSON, ANDROID_KEYSTORE_*)
# Setup: node scripts/setup/setup-wear-player-github-play.js --json ... --keystore ... --keystore-props ...

name: Google Play (AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: "Play track"
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  upload:
    if: vars.ENABLE_GOOGLE_PLAY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=""
          for name in PLAY_JSON KS_B64 KS_PASS KS_ALIAS KEY_PASS; do
            eval "val=\$$name"
            if [ -z "$val" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "::warning::Play upload skipped — missing secrets on eazpire-wear-android:$missing"
            echo "Run workflow 'Propagate Play secrets to Wear mirrors' on eazpire-creator-watch or eazpire-android,"
            echo "or copy secrets manually from eazpire-android (Settings → Secrets)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        if: steps.secrets.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: steps.secrets.outputs.skip != 'true'
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        if: steps.secrets.outputs.skip != 'true'
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode release keystore
        if: steps.secrets.outputs.skip != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Write keystore.properties
        if: steps.secrets.outputs.skip != 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Grant execute permission for gradlew
        if: steps.secrets.outputs.skip != 'true'
        run: chmod +x gradlew

      - name: Compute VERSION_CODE
        if: steps.secrets.outputs.skip != 'true'
        run: |
          BASE='${{ vars.PLAY_VERSION_CODE_BASE }}'
          if [ -z "$BASE" ]; then BASE=1; fi
          VERSION_CODE=$(( BASE + ${{ github.run_number }} ))
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "Using VERSION_CODE=$VERSION_CODE (BASE=$BASE + run=${{ github.run_number }})"

      - name: Build release AAB
        if: steps.secrets.outputs.skip != 'true'
        env:
          CI: "true"
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Upload to Google Play
        if: steps.secrets.outputs.skip != 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.eazpire.wear
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || vars.PLAY_DEFAULT_TRACK || 'internal' }}
          status: completed
